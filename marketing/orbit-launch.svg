<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="Poppins, Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15123a"/><stop offset=".55" stop-color="#0b0a20"/><stop offset="1" stop-color="#06050f"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00c6ff"/><stop offset=".52" stop-color="#a07bff"/><stop offset="1" stop-color="#ff5fa2"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00c6ff"/><stop offset=".5" stop-color="#7c3aed"/><stop offset="1" stop-color="#ff0076"/>
    </linearGradient>
    <radialGradient id="core" cx=".38" cy=".34" r=".75">
      <stop offset="0" stop-color="#ffffff"/><stop offset=".42" stop-color="#bfe0ff"/><stop offset=".7" stop-color="#7aa2ff"/><stop offset="1" stop-color="#5b2bd6"/>
    </radialGradient>
    <radialGradient id="glowP" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#7c3aed" stop-opacity=".5"/><stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2.2"/></filter>
  </defs>

  <!-- backdrop -->
  <rect width="1200" height="630" rx="18" fill="url(#bg)"/>
  <ellipse cx="220" cy="150" rx="380" ry="300" fill="url(#glowP)"/>
  <ellipse cx="1000" cy="520" rx="360" ry="280" fill="#ff0076" opacity=".10"/>

  <!-- twinkling stars -->
  <g fill="#ffffff">
    <circle cx="120" cy="80" r="2"><animate attributeName="opacity" values=".15;.9;.15" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="120" r="1.6"><animate attributeName="opacity" values=".2;.8;.2" dur="2.4s" begin=".5s" repeatCount="indefinite"/></circle>
    <circle cx="930" cy="90" r="2.2"><animate attributeName="opacity" values=".1;1;.1" dur="3.6s" begin="1s" repeatCount="indefinite"/></circle>
    <circle cx="1080" cy="200" r="1.6"><animate attributeName="opacity" values=".2;.85;.2" dur="2.8s" begin=".2s" repeatCount="indefinite"/></circle>
    <circle cx="160" cy="470" r="1.8"><animate attributeName="opacity" values=".15;.9;.15" dur="3.2s" begin=".8s" repeatCount="indefinite"/></circle>
    <circle cx="760" cy="540" r="1.6"><animate attributeName="opacity" values=".2;.8;.2" dur="2.6s" begin="1.4s" repeatCount="indefinite"/></circle>
    <circle cx="1130" cy="430" r="2" ><animate attributeName="opacity" values=".15;.95;.15" dur="3.4s" begin=".3s" repeatCount="indefinite"/></circle>
    <circle cx="380" cy="560" r="1.5"><animate attributeName="opacity" values=".2;.8;.2" dur="2.9s" begin="1.1s" repeatCount="indefinite"/></circle>
  </g>

  <!-- ── Saturn mark ── -->
  <g transform="translate(300 315)">
    <!-- gentle float -->
    <animateTransform attributeName="transform" type="translate" values="300 315; 300 299; 300 315" dur="6s" repeatCount="indefinite" additive="sum"/>
    <ellipse cx="0" cy="0" rx="160" ry="160" fill="url(#glowP)"/>
    <!-- ring (behind) -->
    <g transform="rotate(-24)">
      <ellipse cx="0" cy="0" rx="150" ry="52" fill="none" stroke="url(#ring)" stroke-width="9" filter="url(#soft)"/>
      <ellipse cx="0" cy="0" rx="150" ry="52" fill="none" stroke="url(#ring)" stroke-width="9"/>
    </g>
    <!-- planet core -->
    <circle cx="0" cy="0" r="59" fill="url(#core)"/>
    <circle cx="0" cy="0" r="59" fill="none" stroke="#2a1a5e" stroke-opacity=".4" stroke-width="2"/>
    <!-- orbiting body riding the ring -->
    <g transform="rotate(-24)">
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4.2s" repeatCount="indefinite"/>
        <circle cx="150" cy="0" r="9" fill="#ff5fa2"/>
        <circle cx="150" cy="0" r="9" fill="#ff5fa2" filter="url(#soft)" opacity=".8"/>
      </g>
    </g>
  </g>

  <!-- ── Copy ── -->
  <g transform="translate(560 250)">
    <text x="0" y="0" font-size="140" font-weight="900" letter-spacing="-3" fill="url(#brand)">
      Orbit
      <animate attributeName="opacity" values="0;1" dur=".8s" begin=".4s" fill="freeze"/>
    </text>
    <text x="2" y="62" font-size="34" font-weight="700" fill="#eef1fb">
      Learn in each other’s orbit.
      <animate attributeName="opacity" values="0;1" dur=".8s" begin=".9s" fill="freeze"/>
    </text>
    <text x="2" y="104" font-size="20" font-weight="500" fill="#9aa4c4">
      Teach what you know. Learn what you don’t.
      <animate attributeName="opacity" values="0;1" dur=".8s" begin="1.2s" fill="freeze"/>
    </text>

    <!-- pills -->
    <g font-size="15" font-weight="600" fill="#dfe5f7">
      <g opacity="0"><animate attributeName="opacity" values="0;1" dur=".5s" begin="1.5s" fill="freeze"/>
        <rect x="2" y="140" width="176" height="38" rx="19" fill="#ffffff" fill-opacity=".06" stroke="#ffffff" stroke-opacity=".14"/>
        <text x="22" y="165">Peer skill-swaps</text>
      </g>
      <g opacity="0"><animate attributeName="opacity" values="0;1" dur=".5s" begin="1.65s" fill="freeze"/>
        <rect x="190" y="140" width="208" height="38" rx="19" fill="#ffffff" fill-opacity=".06" stroke="#ffffff" stroke-opacity=".14"/>
        <text x="210" y="165">Cosmic reputation</text>
      </g>
      <g opacity="0"><animate attributeName="opacity" values="0;1" dur=".5s" begin="1.8s" fill="freeze"/>
        <rect x="2" y="186" width="190" height="38" rx="19" fill="#ffffff" fill-opacity=".06" stroke="#ffffff" stroke-opacity=".14"/>
        <text x="22" y="211">Match by location</text>
      </g>
      <g opacity="0"><animate attributeName="opacity" values="0;1" dur=".5s" begin="1.95s" fill="freeze"/>
        <rect x="204" y="186" width="196" height="38" rx="19" fill="#ffffff" fill-opacity=".06" stroke="#ffffff" stroke-opacity=".14"/>
        <text x="224" y="211">Live video sessions</text>
      </g>
    </g>

    <!-- CTA -->
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur=".6s" begin="2.2s" fill="freeze"/>
      <rect x="2" y="248" width="214" height="56" rx="14" fill="url(#ring)"/>
      <text x="32" y="284" font-size="18" font-weight="700" fill="#ffffff">Join the orbit</text>
      <text x="178" y="284" font-size="18" font-weight="700" fill="#ffffff">→
        <animateTransform attributeName="transform" type="translate" values="0 0; 6 0; 0 0" dur="1.8s" begin="3s" repeatCount="indefinite" additive="sum"/>
      </text>
    </g>
  </g>
</svg>
