<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SkillSwap — Peer-to-peer skill exchange platform. Teach what you know, learn what you don't." />
    <title>SkillSwap — Exchange Skills, Grow Together</title>

    <!-- Open Graph (social sharing fallback) -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="SkillSwap" />
    <meta property="og:title"       content="SkillSwap — Exchange Skills, Grow Together" />
    <meta property="og:description" content="Peer-to-peer skill exchange platform. Teach what you know, learn what you don't." />
    <meta property="og:url"         content="https://react-skill-swap-fully-fledged.vercel.app/" />
    <meta property="og:image"       content="https://react-skill-swap-fully-fledged.vercel.app/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="SkillSwap — Exchange Skills, Grow Together" />
    <meta name="twitter:description" content="Peer-to-peer skill exchange platform." />
    <meta name="twitter:image"       content="https://react-skill-swap-fully-fledged.vercel.app/og-image.png" />

    <!-- Canonical fallback (per-route canonical is set by react-helmet-async) -->
    <link rel="canonical" href="https://react-skill-swap-fully-fledged.vercel.app/" />

    <!-- DNS Prefetch & Preconnect for Performance -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Preload critical fonts with font-display: swap -->
    <link rel="preload" href="https://fonts.gstatic.com/s/poppins/v21/pxiByp8kv8JHgFVrLDD4Z1xlFQ.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="https://fonts.gstatic.com/s/opensans/v40/memSYaGs126MiZpBA-UvWbX2vVnXBbObj2OVZyOOSr4dVJWUgsjZ0B4gaVI.woff2" as="font" type="font/woff2" crossorigin />
    
    <!-- Poppins: Modern, friendly headings | Open Sans: Clean, readable body text -->
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&family=Poppins:wght@600;700;800;900&display=swap" rel="stylesheet" />
    
    <!-- Anti-FOUC script to set mode and theme before React renders -->
    <script>
      try {
        const themeState = JSON.parse(localStorage.getItem('skillswap-theme-mode'));
        const isDark = themeState?.state?.isDark ?? true; // default to dark
        document.documentElement.setAttribute('data-mode', isDark ? 'dark' : 'light');
        
        const appearanceState = JSON.parse(localStorage.getItem('skillswap-appearance'));
        const theme = appearanceState?.state?.theme || 'cyan-purple';
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-mode', 'dark');
        document.documentElement.setAttribute('data-theme', 'cyan-purple');
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
