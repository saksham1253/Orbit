<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="ti" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00c6ff"/><stop offset=".5" stop-color="#7c3aed"/><stop offset="1" stop-color="#ff0076"/>
    </linearGradient>
    <radialGradient id="tic" cx=".42" cy=".4" r=".6">
      <stop offset="0" stop-color="#fff"/><stop offset=".55" stop-color="#bfe0ff"/><stop offset="1" stop-color="#6aa8ff"/>
    </radialGradient>
    <filter id="tig" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="3" y="3" width="94" height="94" rx="26" fill="#0b0a20"/>
  <rect x="3.5" y="3.5" width="93" height="93" rx="25.5" fill="none" stroke="#fff" stroke-opacity=".06"/>
  <!-- Tilted elliptical orbit + glowing core + orbiting body -->
  <g transform="rotate(-26 50 50)">
    <ellipse cx="50" cy="50" rx="34" ry="14" fill="none" stroke="url(#ti)" stroke-width="6" filter="url(#tig)"/>
    <circle cx="84" cy="50" r="6" fill="#ff5fa2" filter="url(#tig)"/>
  </g>
  <circle cx="50" cy="50" r="11" fill="url(#tic)" filter="url(#tig)"/>
</svg>
