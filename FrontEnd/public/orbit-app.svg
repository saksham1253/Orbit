<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="sp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00c6ff"/><stop offset=".5" stop-color="#7c3aed"/><stop offset="1" stop-color="#ff0076"/>
    </linearGradient>
    <radialGradient id="spp" cx=".36" cy=".32" r=".8">
      <stop offset="0" stop-color="#e8f3ff"/><stop offset=".4" stop-color="#86acff"/><stop offset="1" stop-color="#4b1fb8"/>
    </radialGradient>
    <filter id="spg" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="3" y="3" width="94" height="94" rx="26" fill="#0b0a20"/>
  <rect x="3.5" y="3.5" width="93" height="93" rx="25.5" fill="none" stroke="#fff" stroke-opacity=".06"/>
  <!-- faint moon -->
  <circle cx="78" cy="24" r="3" fill="#cfe6ff" opacity=".9" filter="url(#spg)"/>
  <!-- ringed planet (Saturn) -->
  <g transform="rotate(-24 50 50)">
    <ellipse cx="50" cy="50" rx="41" ry="14.5" fill="none" stroke="url(#sp)" stroke-width="5.5" filter="url(#spg)"/>
    <circle cx="50" cy="50" r="22" fill="url(#spp)"/>
    <ellipse cx="42" cy="42" rx="9" ry="6" fill="#fff" opacity=".18"/>
    <path d="M10 50 A41 14.5 0 0 0 90 50" fill="none" stroke="url(#sp)" stroke-width="5.5" stroke-linecap="round"/>
  </g>
</svg>
