    </linearGradient>
    <radialGradient id="sat-planet" cx=".38" cy=".34" r=".75">
      <stop offset="0" stop-color="#bfe0ff"/><stop offset=".45" stop-color="#7aa2ff"/><stop offset="1" stop-color="#5b2bd6"/>
