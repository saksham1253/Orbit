name: Build Android APK

# Builds an installable Orbit debug APK in the cloud (free) and uploads it as a
# downloadable artifact. Runs on every push that touches the frontend, and can
# be triggered manually from the Actions tab. No local Android Studio needed.

on:
  push:
    branches: [main]
    paths:
      - 'FrontEnd/**'
      - '.github/workflows/android-apk.yml'
  workflow_dispatch: {}

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FrontEnd
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: FrontEnd/package-lock.json

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web app (Vite + PWA)
        run: npm run build

      - name: Sync web build into Android project
        run: npx cap sync android

      - name: Build debug APK
        working-directory: FrontEnd/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk Orbit.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Orbit-apk
          path: FrontEnd/Orbit.apk
          if-no-files-found: error
          retention-days: 30
