name: Orbit CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        # Node 22: Vite 8 requires >=20.19 and the Capacitor toolchain requires
        # >=22, so the old 18.x no longer builds the frontend.
        node-version: [22.x]

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'

    # Backend Tests
    - name: Install Backend Dependencies
      working-directory: ./BackEnd
      run: npm ci

    - name: Run Backend Unit Tests
      working-directory: ./BackEnd
      # --runInBand: the DB suites spin up mongodb-memory-server; running them
      # serially avoids parallel-worker port/connection races on the 2-core runner.
      run: npx jest --runInBand --passWithNoTests

    # Frontend Tests & Build
    - name: Install Frontend Dependencies
      working-directory: ./FrontEnd
      run: npm ci

    - name: Run Frontend Lint
      working-directory: ./FrontEnd
      run: npm run lint

    - name: Run Frontend Component Tests
      working-directory: ./FrontEnd
      run: npx vitest run --passWithNoTests

    - name: Build Frontend Application
      working-directory: ./FrontEnd
      run: npm run build
      env:
        VITE_SOCKET_URL: 'https://skillswap-api.example.com'
